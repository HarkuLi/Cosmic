services:
  maplestory:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Login server
      - "8484:8484"
      # Channels.
      # Format: WWCC, where WW is 75 plus the world number and CC is 75 plus the channel number (both zero indexed).
      # In this case, world 1 channels 1-3.
      - "7575-7577:7575-7577"
    volumes:
      # Config changes can be reloaded without rebuilding the image.
      # Still requires a redeployment as they're sourced on startup.
      - ./config.yaml:/opt/server/config.yaml
      - ./scripts:/opt/server/scripts
      - ./wz:/opt/server/wz
    env_file:
      - ./.env

  db:
    image: mysql:8.4.0
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_ROOT_PASSWORD: "${DB_PASS}"
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      timeout: 5s
      interval: 5s
      retries: 3

  db-backup:
    image: percona/percona-xtrabackup:8.4
    init: true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/db-backup/scripts:/scripts
      - db-data:/var/lib/mysql:ro
      - ./database/backups:/backup
    user: root
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD:
    command:
      - /scripts/auto_backup

volumes:
  db-data:
